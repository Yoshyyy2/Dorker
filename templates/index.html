<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yosh Dorker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-2xl mx-auto p-6">
        <h1 class="text-3xl font-bold">Yosh Dorker</h1>
        <p class="text-zinc-400 mb-6">Simple Google Dork Tool</p>

        <!-- Search + Number -->
        <div class="flex gap-2 mb-4">
            <input id="dork" type="text" value="inurl:.myshopify.com thrift" 
                   class="flex-1 bg-zinc-900 border border-zinc-700 px-4 py-3 rounded-lg text-lg">
            
            <select id="num" class="bg-zinc-900 border border-zinc-700 px-4 rounded-lg text-lg">
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="150">150</option>
            </select>

            <button onclick="search()" 
                    class="bg-white text-black px-8 rounded-lg font-medium">Search</button>
        </div>

        <!-- Quick Dorks -->
        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="quickSearch(this)" class="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 text-sm rounded-lg">inurl:.myshopify.com thrift</button>
            <button onclick="quickSearch(this)" class="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 text-sm rounded-lg">inurl:.myshopify.com resale</button>
            <button onclick="quickSearch(this)" class="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 text-sm rounded-lg">inurl:pages.razorpay.com donate</button>
        </div>

        <!-- Results Box -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-semibold">Results <span id="count" class="text-zinc-400"></span></h2>
                <button onclick="copyAll()" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 text-sm rounded-lg flex items-center gap-x-2">
                    <span>📋</span>
                    <span>Copy All</span>
                </button>
            </div>

            <div id="results" class="space-y-2 min-h-[200px]"></div>
        </div>
    </div>

    <script>
        async function search() {
            const dork = document.getElementById('dork').value.trim();
            const num = document.getElementById('num').value;

            if (!dork) return;

            const resDiv = document.getElementById('results');
            resDiv.innerHTML = `<p class="text-zinc-400 text-center py-8">Searching...</p>`;

            const res = await fetch('/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({dork: dork, num: num})
            });

            const data = await res.json();
            resDiv.innerHTML = '';

            if (!data.results || data.results.length === 0) {
                resDiv.innerHTML = `<p class="text-zinc-400 text-center py-8">No results found.</p>`;
                return;
            }

            document.getElementById('count').innerText = `(${data.results.length})`;

            data.results.forEach(item => {
                const div = document.createElement('div');
                div.className = 'bg-zinc-800 hover:bg-zinc-700 px-4 py-3 rounded-xl flex justify-between items-center transition-colors';
                div.innerHTML = `
                    <a href="${item.link}" target="_blank" class="text-emerald-400 hover:underline break-all flex-1 pr-3">
                        ${item.link}
                    </a>
                    <button onclick="copyLink('${item.link}', this)" 
                            class="text-xs px-3 py-1 bg-zinc-700 hover:bg-zinc-600 rounded">
                        Copy
                    </button>
                `;
                resDiv.appendChild(div);
            });
        }

        function quickSearch(el) {
            document.getElementById('dork').value = el.innerText;
            search();
        }

        function copyLink(link, btn) {
            navigator.clipboard.writeText(link).then(() => {
                const old = btn.innerText;
                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = old, 1000);
            });
        }

        function copyAll() {
            const links = [];
            document.querySelectorAll('#results a').forEach(a => links.push(a.href));
            if (links.length === 0) return alert("No results");

            navigator.clipboard.writeText(links.join('\n')).then(() => {
                alert(`Copied ${links.length} links!`);
            });
        }
    </script>
</body>
</html>
