<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yosh Dorker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-3xl mx-auto px-5 pt-8">
        
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold tracking-tight">Yosh Dorker</h1>
            <p class="text-zinc-400 mt-1">Simple Google Dork Tool</p>
        </div>

        <!-- Search Bar -->
        <div class="flex gap-2 mb-6">
            <input id="dork-input" type="text" 
                   class="flex-1 bg-zinc-900 border border-zinc-700 px-4 py-3 rounded text-lg focus:outline-none focus:border-zinc-500"
                   placeholder="Enter dork here..." 
                   onkeypress="if(event.key === 'Enter') searchDork()">
            <button onclick="searchDork()" 
                    class="bg-white text-black px-8 rounded font-medium hover:bg-zinc-200 transition-colors">
                Search
            </button>
        </div>

        <!-- Quick Dorks -->
        <div class="flex flex-wrap gap-2 mb-8">
            <button onclick="quickDork(this)" class="px-4 py-1.5 text-sm bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded">inurl:.myshopify.com thrift</button>
            <button onclick="quickDork(this)" class="px-4 py-1.5 text-sm bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded">inurl:.myshopify.com resale</button>
            <button onclick="quickDork(this)" class="px-4 py-1.5 text-sm bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded">inurl:pages.razorpay.com donate</button>
        </div>

        <!-- Results Header -->
        <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold text-lg">Results <span id="count" class="text-sm text-zinc-500 font-normal"></span></h2>
            <button onclick="copyAll()" 
                    class="text-sm px-4 py-1.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 rounded flex items-center gap-x-2 hidden" id="copy-btn">
                <i class="fa-solid fa-copy"></i> 
                <span>Copy All</span>
            </button>
        </div>

        <!-- Results List -->
        <div id="results" class="space-y-2"></div>

    </div>

    <script>
        function quickDork(el) {
            document.getElementById('dork-input').value = el.innerText;
            searchDork();
        }

        async function searchDork() {
            const dork = document.getElementById('dork-input').value.trim();
            if (!dork) return alert("Please enter a dork");

            const resultsDiv = document.getElementById('results');
            const countSpan = document.getElementById('count');
            const copyBtn = document.getElementById('copy-btn');

            resultsDiv.innerHTML = `<div class="text-zinc-400 py-6">Searching...</div>`;
            countSpan.innerText = '';
            copyBtn.classList.add('hidden');

            try {
                const res = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({dork: dork})
                });
                const data = await res.json();

                if (!data.results || data.results.length === 0) {
                    resultsDiv.innerHTML = `<div class="text-zinc-400 py-6">No results found.</div>`;
                    return;
                }

                countSpan.innerText = `(${data.results.length})`;
                copyBtn.classList.remove('hidden');

                let html = '';
                data.results.forEach(r => {
                    html += `
                        <div class="bg-zinc-900 border border-zinc-800 p-4 rounded">
                            <a href="\( {r.link}" target="_blank" class="text-emerald-400 hover:underline break-all"> \){r.title || r.link}</a>
                            <p class="text-sm text-zinc-400 mt-1 line-clamp-2">${r.snippet || ''}</p>
                            
                            <div class="flex justify-between items-center mt-3">
                                <span class="text-xs text-zinc-500 break-all">${r.link}</span>
                                <button onclick="copyLink('${r.link}', this)" 
                                        class="text-xs px-3 py-1 bg-zinc-800 hover:bg-zinc-700 rounded">Copy</button>
                            </div>
                        </div>`;
                });
                resultsDiv.innerHTML = html;

            } catch (e) {
                resultsDiv.innerHTML = `<div class="text-red-400">Error occurred</div>`;
            }
        }

        function copyLink(link, btn) {
            navigator.clipboard.writeText(link).then(() => {
                const oldText = btn.innerText;
                btn.innerText = 'Copied!';
                setTimeout(() => {
                    btn.innerText = oldText;
                }, 1200);
            });
        }

        function copyAll() {
            const links = [];
            document.querySelectorAll('#results a').forEach(a => links.push(a.href));
            if (links.length === 0) return;

            navigator.clipboard.writeText(links.join('\n')).then(() => {
                const btn = document.getElementById('copy-btn');
                const oldHTML = btn.innerHTML;
                btn.innerHTML = `<i class="fa-solid fa-check"></i> Copied!`;
                setTimeout(() => {
                    btn.innerHTML = oldHTML;
                }, 1500);
            });
        }
    </script>
</body>
</html>
